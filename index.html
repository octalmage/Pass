<!DOCTYPE html>
<html>
  <head>
    <title>Pass</title>
    <meta charset="utf-8">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        color: #222;
        overflow: hidden;
      }

      video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        background: #000;
      }

      #dragBar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 25px;
        z-index: 10;
        -webkit-app-region: drag;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: #f5f5f7;
        z-index: 20;
        padding: 24px;
        box-sizing: border-box;
        flex-direction: column;
      }
      .modal.visible { display: flex; }
      .modal h2 { margin: 0 0 12px 0; font-size: 16px; font-weight: 600; }
      .modal .body { flex: 1; overflow-y: auto; margin-bottom: 16px; }
      .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
      .modal button {
        padding: 6px 14px;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .modal button.primary { background: #0a7cff; color: #fff; border-color: #0a7cff; }
      .row {
        display: block;
        padding: 6px 4px;
        cursor: pointer;
      }
      .row:hover { background: #ececef; border-radius: 4px; }
      .muted { color: #888; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="dragBar"></div>
    <video></video>

    <div id="pickSourceModal" class="modal">
      <h2>Pick a window to send</h2>
      <div id="pickSourceList" class="body"></div>
      <div class="actions">
        <button id="pickSourceCancel">Cancel</button>
      </div>
    </div>

    <div id="pickModal" class="modal">
      <h2>Send to which computer?</h2>
      <div id="pickList" class="body"></div>
      <div class="actions">
        <button id="pickCancel">Cancel</button>
        <button id="pickSend" class="primary">Send</button>
      </div>
    </div>

    <div id="requestModal" class="modal">
      <h2>Incoming window from <span id="requestHost"></span></h2>
      <div class="body">Accept the shared window?</div>
      <div class="actions">
        <button id="requestDecline">Decline</button>
        <button id="requestAccept" class="primary">Accept</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
